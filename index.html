<script>
/**
 * 🛡️ SUPER ADVANCED TRACKING (DESIGNED FOR DYNAMIC)
 */

// Function to handle Stat clicks manually for 100% accuracy
function trackStat(name) {
    fbq('track', 'StatClicked', { type: name });
    console.log("Stat Tracked: " + name);
}

document.addEventListener("DOMContentLoaded", function () {
    // Force initialize fbq if dynamic script is slow
    window.fbq = window.fbq || function() { (window.fbq.q = window.fbq.q || []).push(arguments) };

    // 1. VISIT & PAGE EVENTS (Sabse pehle fire honge)
    fbq('track', 'PageView');
    fbq('track', 'Visit', { domain: 'newdiwarxyz.store' });
    fbq('track', 'LandingPageView');
    fbq('track', 'FullLoadComplete');
    console.log("Visit Events Fired");

    // 2. DOWNLOAD TRACKING (Multiple events like your example)
    const dlBtn = document.getElementById('quickDL');
    if (dlBtn) {
        dlBtn.addEventListener("click", function() {
            fbq('track', 'HeroDownloadClick');
            fbq('track', 'DownloadClick', { 
                file: '𝐄𝐏 𝐍𝐔𝐌𝐁𝐄𝐑 𝐏𝐀𝐍𝐄𝐋.apk',
                domain: 'mr-c-six.vercel.app/'
            });
            fbq('track', 'SidebarDownloadClick'); // Adding more as per your request
            console.log("All Download Events Fired");
        });
    }

    // 3. LOGO/APP ICON CLICK
    const logo = document.getElementById('logoClick');
    if (logo) {
        logo.addEventListener("click", () => {
            fbq('track', 'AppIconClick');
            fbq('track', 'LogoClicked');
        });
    }

    // 4. SCROLL DEPTH (Fixed for dynamic height)
    let scrollMarks = {25:false, 50:false, 75:false, 100:false};
    window.addEventListener('scroll', function() {
        let docHeight = document.documentElement.scrollHeight - window.innerHeight;
        if (docHeight <= 0) return;
        let scrolled = Math.round((window.scrollY / docHeight) * 100);

        if (scrolled >= 25 && !scrollMarks[25]) { fbq('track', 'Scroll25'); scrollMarks[25] = true; }
        if (scrolled >= 50 && !scrollMarks[50]) { fbq('track', 'Scroll50'); scrollMarks[50] = true; }
        if (scrolled >= 75 && !scrollMarks[75]) { fbq('track', 'Scroll75'); scrollMarks[75] = true; }
        if (scrolled >= 95 && !scrollMarks[100]) { fbq('track', 'Scroll100'); scrollMarks[100] = true; }
    });
});
</script>
